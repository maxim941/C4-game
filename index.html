<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>C4 Defuse</title>

<style>
body {
    background: #111;
    text-align: center;
    color: white;
    font-family: monospace;
}

.bomb {
    position: relative;
    display: inline-block;
}

.bomb img {
    width: 600px;
}

#display {
    position: absolute;
    top: 70px;
    left: 150px;
    width: 300px;
    text-align: center;
    font-size: 40px;
    color: red;
}

#status {
    position: absolute;
    bottom: 120px;
    right: 60px;
    color: lime;
}

.key {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: pointer;
}

.k1 { top: 200px; left: 230px; }
.k2 { top: 200px; left: 300px; }
.k3 { top: 200px; left: 370px; }

.k4 { top: 270px; left: 230px; }
.k5 { top: 270px; left: 300px; }
.k6 { top: 270px; left: 370px; }

.k7 { top: 340px; left: 230px; }
.k8 { top: 340px; left: 300px; }
.k9 { top: 340px; left: 370px; }

.k0 { top: 410px; left: 300px; }

.kstar { top: 410px; left: 230px; }
.khash { top: 410px; left: 370px; }

.start { top: 250px; right: 70px; width: 100px; height: 50px; }
.return { top: 180px; right: 70px; width: 100px; height: 50px; }

.settings {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>💣 C4 Defuse</h2>

<div class="bomb">
    <img src="img/bomb.png">

    <div id="display">--------</div>
    <div id="status">WAITING</div>

    <!-- цифры -->
    <div class="key k1" onclick="press(1)"></div>
    <div class="key k2" onclick="press(2)"></div>
    <div class="key k3" onclick="press(3)"></div>

    <div class="key k4" onclick="press(4)"></div>
    <div class="key k5" onclick="press(5)"></div>
    <div class="key k6" onclick="press(6)"></div>

    <div class="key k7" onclick="press(7)"></div>
    <div class="key k8" onclick="press(8)"></div>
    <div class="key k9" onclick="press(9)"></div>

    <div class="key k0" onclick="press(0)"></div>

    <!-- спец -->
    <div class="key kstar" onclick="clearInput()"></div>
    <div class="key khash" onclick="submitCode()"></div>

    <!-- управление -->
    <div class="key start" onclick="startGame()"></div>
    <div class="key return" onclick="resetGame()"></div>
</div>

<div class="settings">
    <label>Время запоминания (1–10 сек): </label>
    <input id="time" type="number" min="1" max="10" value="3">
</div>

<script>
let code = "";
let input = "";
let active = false;
let visible = false;

// 8-значный код
function generateCode() {
    code = "";
    for (let i = 0; i < 8; i++) {
        code += Math.floor(Math.random() * 10);
    }
}

// старт игры
function startGame() {
    generateCode();
    input = "";
    active = true;
    visible = true;

    document.getElementById("status").textContent = "MEMORIZE";
    document.getElementById("display").textContent = code;

    let time = parseInt(document.getElementById("time").value) || 3;
    time = Math.max(1, Math.min(10, time));

    setTimeout(() => {
        document.getElementById("display").textContent = "--------";
        document.getElementById("status").textContent = "ENTER CODE";
        visible = false;

        new Audio("sounds/plant.mp3").play();
    }, time * 1000);
}

// ввод
function press(num) {
    if (!active || visible) return;

    if (input.length < 8) {
        input += num;
        document.getElementById("display").textContent = input;
    }
}

// очистка
function clearInput() {
    if (!active || visible) return;

    input = "";
    document.getElementById("display").textContent = "--------";
}

// проверка
function submitCode() {
    if (!active || visible) return;

    if (input === code) {
        success();
    } else {
        fail();
    }
}

// сброс
function resetGame() {
    input = "";
    active = false;
    document.getElementById("display").textContent = "--------";
    document.getElementById("status").textContent = "WAITING";
}

// успех
function success() {
    new Audio("sounds/success.mp3").play();
    document.getElementById("status").textContent = "DEFUSED";
    active = false;
}

// провал
function fail() {
    new Audio("sounds/fail.mp3").play();
    document.getElementById("status").textContent = "BOOM";
    active = false;
}
</script>

</body>
</html>
